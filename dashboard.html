<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexLib | Dashboard</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar glass" style="margin: 1.5rem; border-radius: 1.5rem; display: flex; flex-direction: column; position: relative; overflow: hidden;">
            <div class="logo" style="font-size: 1.75rem; font-weight: 800; color: var(--text-primary); margin-bottom: 2.5rem; display: flex; align-items: center; gap: 0.5rem;">
                <div style="width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--primary), #a855f7); display: flex; align-items: center; justify-content: center; color: white;">N</div>
                NexLib
            </div>
            
            <nav id="sidebar-nav" style="flex: 1;">
                <div class="nav-section-title" style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 0.75rem; padding-left: 0.5rem;">Menu</div>
                
                <div class="nav-item active" data-view="overview">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Dashboard
                </div>
                <div class="nav-item" data-view="books">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    Book Search
                </div>
                <div class="nav-item" data-view="my-books">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    My Books
                </div>
                <div class="nav-item" data-view="profile">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    My Profile
                </div>

                <!-- Admin Only -->
                <div id="admin-links" style="display: none; margin-top: 2rem;">
                    <div class="nav-section-title" style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--danger); margin-bottom: 0.75rem; padding-left: 0.5rem; display: flex; align-items: center; gap: 0.25rem;">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        Admin Portal
                    </div>
                    <div class="nav-item" data-view="manage-transactions">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        All Transactions
                    </div>
                    <div class="nav-item" data-view="manage-books">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"/></svg>
                        Manage Books
                    </div>
                    <div class="nav-item" data-view="manage-users">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                        Manage Users
                    </div>
                </div>
            </nav>

            <div style="margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
                <button id="logout-btn" class="btn-outline" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s;">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem; padding: 1.5rem 2rem; background: var(--glass-bg); backdrop-filter: blur(12px); border-radius: 1.5rem; border: 1px solid var(--glass-border); box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                <div>
                    <h2 id="view-title" style="font-size: 1.75rem; font-weight: 700; background: linear-gradient(to right, white, #cbd5e1); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.25rem;">Dashboard Overview</h2>
                    <p style="color: var(--text-secondary); font-size: 0.95rem;">Welcome back, <span id="user-name" style="color: white; font-weight: 600;">User</span></p>
                </div>
                <div id="header-actions">
                    <!-- Dynamic buttons based on view -->
                </div>
            </header>

            <div id="view-content">
                <!-- Views loaded here via JS -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="book-modal" class="modal">
        <div class="modal-content glass">
            <h3 id="modal-title" style="margin-bottom: 1.5rem;">Add New Book</h3>
            <form id="book-form">
                <input type="hidden" id="book-id">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="book-title-input" required>
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" id="book-author" required>
                </div>
                <div class="form-group">
                    <label>ISBN</label>
                    <input type="text" id="book-isbn">
                </div>
                <div class="form-group">
                    <label>Cover Image Upload (From Device)</label>
                    <input type="file" id="book-image-file" accept="image/*" style="padding: 0.5rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: white; width: 100%;">
                    <small style="color: var(--text-secondary); margin-top: 0.5rem; display: block;">OR provide a Web URL below (Device Upload takes priority)</small>
                </div>
                <div class="form-group">
                    <label>Cover Image URL (Web Link or Auto-fetch)</label>
                    <input type="text" id="book-image-url" placeholder="https://example.com/cover.jpg">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="book-quantity" value="1">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn-outline" onclick="closeModal('book-modal')">Cancel</button>
                    <button type="submit" class="btn-primary" style="flex: 1;">Save Book</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/dashboard.js"></script>
</body>

</html>
